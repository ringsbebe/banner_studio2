<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>得獎 Banner 產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--panel:#16161a;--panel2:#1e1e24;--border:#28282f;
  --gold:#E8B84B;--gold2:#c9973a;--text:#f0f0f5;--muted:#6b6b7e;
  --green:#3ecf8e;--r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}
.sidebar{width:340px;min-width:340px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── SIDEBAR HEADER ── */
.s-hd{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-dot{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:14px}
.brand-name{font-size:14px;font-weight:900;letter-spacing:.06em;color:var(--text)}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:.04em;padding-left:38px}

/* ── SCROLL ── */
.s-scroll{flex:1;overflow-y:auto;padding:16px}
.s-scroll::-webkit-scrollbar{width:3px}
.s-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── SECTION ── */
.sec{margin-bottom:20px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── INPUTS ── */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:10px;color:var(--muted);letter-spacing:.03em}
input[type=text],textarea{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;resize:none;transition:border .15s}
input[type=text]:focus,textarea:focus{border-color:var(--gold)}
textarea{height:58px;line-height:1.5}

/* ── TEMPLATE PILLS ── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.pill.on{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.1)}
.pill:hover:not(.on){border-color:var(--text);color:var(--text)}

/* ── DOWNLOAD BUTTON ── */
.btn-dl-all{width:100%;padding:13px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1000;font-size:13px;font-weight:900;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:.08em;transition:opacity .15s;margin-top:8px}
.btn-dl-all:hover{opacity:.88}
.btn-dl-all:active{opacity:.7}

/* ── HINT ── */
.hint{font-size:10px;color:var(--muted);line-height:1.6;padding:10px;background:var(--panel2);border-radius:7px;border:1px solid var(--border)}
.hint b{color:var(--gold)}

/* ── TOPBAR ── */
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:11px;color:var(--muted);font-family:monospace}
.status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PREVIEW WALL ── */
.preview-wall{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:24px;background:var(--bg)}
.preview-wall::-webkit-scrollbar{width:4px}
.preview-wall::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── PREVIEW CARD ── */
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pcard-hd{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.pcard-label{display:flex;align-items:center;gap:7px}
.pcard-tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--gold);background:rgba(232,184,75,.1);border:1px solid rgba(232,184,75,.2);padding:2px 8px;border-radius:4px}
.pcard-size{font-size:10px;color:var(--muted);font-family:monospace}
.btn-dl-single{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.btn-dl-single:hover{border-color:var(--gold);color:var(--gold)}
.canvas-wrap{padding:12px;background:var(--bg);display:flex;justify-content:center}
canvas{border-radius:6px;max-width:100%;height:auto;display:block}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="s-hd">
    <div class="brand">
      <div class="brand-dot">🏆</div>
      <span class="brand-name">得獎 Banner 產生器</span>
    </div>
    <div class="brand-sub">輸入文字 → 三種尺寸同步產出</div>
  </div>
  <div class="s-scroll">

    <div class="sec">
      <div class="sec-title">模版</div>
      <div class="pill-row">
        <button class="pill on" onclick="applyTpl('award',this)">🏆 得獎賀圖</button>
        <button class="pill" onclick="applyTpl('book',this)">📖 新書上市</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">主標題</div>
      <div class="field">
        <label class="fl">前綴（如：狂賀!）</label>
        <input type="text" id="f-prefix" value="狂賀!" oninput="renderAll()">
      </div>
      <div class="field">
        <label class="fl">獎項名稱</label>
        <input type="text" id="f-award" value="2026金鼎獎" oninput="renderAll()">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">得獎資訊 1</div>
      <div class="field">
        <label class="fl">榮獲單位</label>
        <input type="text" id="f-unit" value="親子天下有聲故事書榮獲" oninput="renderAll()">
      </div>
      <div class="field">
        <label class="fl">獎項說明</label>
        <input type="text" id="f-desc" value="2026金鼎獎，數位出版類：數位創新獎" oninput="renderAll()">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">得獎資訊 2</div>
      <div class="field">
        <label class="fl">得獎作品（用 | 換行）</label>
        <textarea id="f-books">〈親子天下〉、〈小行星幼兒誌〉、|〈真的？假的？破解假訊息的數位思辨力〉</textarea>
      </div>
      <div class="field">
        <label class="fl">得獎細項</label>
        <input type="text" id="f-items" value="最佳新雜誌、最佳童書獎入選、最佳網路專輯獎" oninput="renderAll()">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">下載</div>
      <button class="btn-dl-all" onclick="downloadAll()">⬇ 一鍵下載全部尺寸</button>
    </div>

    <div class="hint">
      <b>GitHub 檔案結構：</b><br>
      index.html<br>
      bg.jpg &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;← 1920×1080 底圖<br>
      bg_square.jpg ← 1080×1080 底圖<br>
      bg_wide.jpg &nbsp;&nbsp;← 1200×630 底圖<br>
      logo.png &nbsp;&nbsp;&nbsp;&nbsp;← 親子天下 Logo
    </div>

  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title">PREVIEW WALL — 三尺寸同步渲染</span>
    <div class="status"><div class="status-dot"></div>即時更新中</div>
  </div>
  <div class="preview-wall">

    <!-- 1920×1080 -->
    <div class="pcard">
      <div class="pcard-hd">
        <div class="pcard-label">
          <span class="pcard-tag">FB / 橫幅</span>
          <span class="pcard-size">1920 × 1080</span>
        </div>
        <button class="btn-dl-single" onclick="downloadOne('c1','banner_1920x1080.png')">⬇ 下載</button>
      </div>
      <div class="canvas-wrap"><canvas id="c1" width="1920" height="1080"></canvas></div>
    </div>

    <!-- 1080×1080 -->
    <div class="pcard">
      <div class="pcard-hd">
        <div class="pcard-label">
          <span class="pcard-tag">IG / 正方形</span>
          <span class="pcard-size">1080 × 1080</span>
        </div>
        <button class="btn-dl-single" onclick="downloadOne('c2','banner_1080x1080.png')">⬇ 下載</button>
      </div>
      <div class="canvas-wrap"><canvas id="c2" width="1080" height="1080"></canvas></div>
    </div>

    <!-- 1200×630 -->
    <div class="pcard">
      <div class="pcard-hd">
        <div class="pcard-label">
          <span class="pcard-tag">FB 分享連結</span>
          <span class="pcard-size">1200 × 630</span>
        </div>
        <button class="btn-dl-single" onclick="downloadOne('c3','banner_1200x630.png')">⬇ 下載</button>
      </div>
      <div class="canvas-wrap"><canvas id="c3" width="1200" height="630"></canvas></div>
    </div>

  </div>
</div>
</div>

// ── 素材 ──
const IMGS = { bg1:null, bg2:null, bg3:null, logo:null };

function loadImg(key, src) {
  return new Promise(res => {
    const img = new Image();
    img.onload  = () => { IMGS[key] = img; res(); };
    img.onerror = () => res();
    img.src = src;
  });
}

// ── 讀取輸入 ──
const gv = id => document.getElementById(id).value;

// ── 中英數補償渲染 ──
function drawMixed(ctx, text, x, y, baseSz, weight, family, color, shadowOn=true) {
  const boost = 1.12;
  let curX = x;
  if(shadowOn){ ctx.shadowColor='rgba(0,0,0,0.65)'; ctx.shadowBlur=baseSz*.15; ctx.shadowOffsetX=2; ctx.shadowOffsetY=3; }
  ctx.fillStyle = color;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    const isLatin = /[A-Za-z0-9]/.test(ch);
    const sz = isLatin ? Math.round(baseSz*boost) : baseSz;
    const yAdj = isLatin ? Math.round((sz-baseSz)*.15) : 0;
    ctx.font = `${weight} ${sz}px ${family}`;
    ctx.fillText(ch, curX, y+yAdj);
    curX += ctx.measureText(ch).width;
  }
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  return curX - x;
}

// ── 漸層背景備案 ──
function drawFallback(ctx, W, H) {
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#ff2d8a'); g.addColorStop(.5,'#e8007d'); g.addColorStop(1,'#b5005e');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

// ── 繪製 Logo（固定右下角）──
function drawLogo(ctx, W, H, scale=1) {
  if(!IMGS.logo) return;
  const maxW = W * 0.14 * scale;
  const lw = Math.min(IMGS.logo.naturalWidth, maxW);
  const lh = IMGS.logo.naturalHeight * (lw/IMGS.logo.naturalWidth);
  const margin = W * 0.025;
  ctx.drawImage(IMGS.logo, W-lw-margin, H-lh-margin, lw, lh);
}

// ══════════════════════════════════
// RENDER 1：1920×1080
// ══════════════════════════════════
function render1() {
  const cv=document.getElementById('c1'), ctx=cv.getContext('2d');
  const W=1920, H=1080;
  ctx.clearRect(0,0,W,H);

  if(IMGS.bg3){ const s=Math.max(W/IMGS.bg3.naturalWidth,H/IMGS.bg3.naturalHeight); const dw=IMGS.bg3.naturalWidth*s,dh=IMGS.bg3.naturalHeight*s; ctx.drawImage(IMGS.bg3,(W-dw)/2,(H-dh)/2,dw,dh); }
  else drawFallback(ctx,W,H);

  ctx.textBaseline='alphabetic'; ctx.textAlign='left';

  // 狂賀! 明體
  drawMixed(ctx, gv('f-prefix'), 120, 330, 220, '900', '"Noto Serif TC",serif', '#E8B84B');
  // 獎項名 黑體（貼右）
  drawMixed(ctx, gv('f-award'),  670, 338, 160, '900', '"Noto Sans TC",sans-serif', '#E8B84B');
  // 榮獲單位
  drawMixed(ctx, gv('f-unit'),   618, 530, 81,  '700', '"Noto Serif TC",serif', '#E8B84B');
  // 獎項說明
  drawMixed(ctx, gv('f-desc'),   618, 625, 58,  '500', '"Noto Sans TC",sans-serif', '#ffffff');
  // 書名列
  let by = 740;
  gv('f-books').split('|').forEach(line => {
    drawMixed(ctx, line.trim(), 470, by, 60, '700', '"Noto Serif TC",serif', '#E8B84B');
    by += 60*1.35;
  });
  // 細項
  drawMixed(ctx, gv('f-items'), 470, by+10, 50, '500', '"Noto Sans TC",sans-serif', '#ffffff');

  drawLogo(ctx, W, H);
}

// ══════════════════════════════════
// RENDER 2：1080×1080
// ══════════════════════════════════
function render2() {
  const cv=document.getElementById('c2'), ctx=cv.getContext('2d');
  const W=1080, H=1080;
  ctx.clearRect(0,0,W,H);

  if(IMGS.bg2){ const s=Math.max(W/IMGS.bg2.naturalWidth,H/IMGS.bg2.naturalHeight); const dw=IMGS.bg2.naturalWidth*s,dh=IMGS.bg2.naturalHeight*s; ctx.drawImage(IMGS.bg2,(W-dw)/2,(H-dh)/2,dw,dh); }
  else drawFallback(ctx,W,H);

  ctx.textBaseline='alphabetic'; ctx.textAlign='left';

  // ── 上1/3：主標題 ──
  drawMixed(ctx, gv('f-prefix'), 60,  185, 115, '900', '"Noto Serif TC",serif', '#E8B84B');
  drawMixed(ctx, gv('f-award'),  360, 185, 90,  '900', '"Noto Sans TC",sans-serif', '#E8B84B');

  // ── 下1/3：得獎資訊（置中）──
  function drawCenter(text, y, sz, weight, family, color) {
    ctx.font = `${weight} ${sz}px ${family}`;
    const tw = ctx.measureText(text).width;
    drawMixed(ctx, text, (W-tw)/2, y, sz, weight, family, color);
  }

  drawCenter(gv('f-unit'), 660, 56, '700', '"Noto Serif TC",serif', '#E8B84B');
  drawCenter(gv('f-desc'), 730, 38, '500', '"Noto Sans TC",sans-serif', '#ffffff');

  let sy = 810;
  gv('f-books').split('|').forEach(line => {
    ctx.font = `700 42px "Noto Serif TC",serif`;
    const tw2 = ctx.measureText(line.trim()).width;
    drawMixed(ctx, line.trim(), (W-tw2)/2, sy, 42, '700', '"Noto Serif TC",serif', '#E8B84B');
    sy += 42*1.4;
  });
  ctx.font = `500 34px "Noto Sans TC",sans-serif`;
  const tw3 = ctx.measureText(gv('f-items')).width;
  drawMixed(ctx, gv('f-items'), (W-tw3)/2, sy+8, 34, '500', '"Noto Sans TC",sans-serif', '#ffffff');

  drawLogo(ctx, W, H, 0.9);
}

// ══════════════════════════════════
// RENDER 3：1200×630
// ══════════════════════════════════
function render3() {
  const cv=document.getElementById('c3'), ctx=cv.getContext('2d');
  const W=1200, H=630;
  ctx.clearRect(0,0,W,H);

  if(IMGS.bg3){ const s=Math.max(W/IMGS.bg3.naturalWidth,H/IMGS.bg3.naturalHeight); const dw=IMGS.bg3.naturalWidth*s,dh=IMGS.bg3.naturalHeight*s; ctx.drawImage(IMGS.bg3,(W-dw)/2,(H-dh)/2,dw,dh); }
  else drawFallback(ctx,W,H);

  ctx.textBaseline='alphabetic'; ctx.textAlign='left';

  const sx = 60;
  drawMixed(ctx, gv('f-prefix'), sx,  155, 128, '900', '"Noto Serif TC",serif', '#E8B84B');
  drawMixed(ctx, gv('f-award'),  sx+370, 155, 96, '900', '"Noto Sans TC",sans-serif', '#E8B84B');
  drawMixed(ctx, gv('f-unit'),   sx,  265, 52, '700', '"Noto Serif TC",serif', '#E8B84B');
  drawMixed(ctx, gv('f-desc'),   sx,  325, 38, '500', '"Noto Sans TC",sans-serif', '#ffffff');

  let by2 = 405;
  gv('f-books').split('|').forEach(line => {
    drawMixed(ctx, line.trim(), sx, by2, 36, '700', '"Noto Serif TC",serif', '#E8B84B');
    by2 += 36*1.4;
  });
  drawMixed(ctx, gv('f-items'), sx, by2+8, 30, '500', '"Noto Sans TC",sans-serif', '#ffffff');

  drawLogo(ctx, W, H, 0.85);
}

function renderAll() { render1(); render2(); render3(); }

function downloadOne(canvasId, filename) {
  const cv = document.getElementById(canvasId);
  renderAll();
  const a = document.createElement('a');
  a.download = filename;
  a.href = cv.toDataURL('image/png');
  a.click();
}

  setTimeout(()=>downloadOne('c3','banner_1200x630.png'),  1100);
}

    document.fonts.load('900 80px "Noto Serif TC"'),
    document.fonts.load('700 60px "Noto Serif TC"'),
    document.fonts.load('900 60px "Noto Sans TC"'),
    document.fonts.load('500 40px "Noto Sans TC"')
  );
  Promise.all(promises).then(() => renderAll());
}
preload();

// 即時更新 textarea
document.getElementById('f-books').addEventListener('input', renderAll);
</script>
</body>
